<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/mechtrack-favicon.svg" />
    <!-- Early connection to Google Fonts for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f6f3ed" />
    <meta name="description" content="MechTrack Pulse — Digital Factory Control System with 3D visualization, real-time monitoring, and AI-powered insights" />
    <meta name="color-scheme" content="light dark" />
    <title>MechTrackPulse — Precision. Progress. Performance.</title>
    <script>
      // Prevent FOUC by applying theme before render
      (function(){
        var t = localStorage.getItem('mechtrack-theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
        document.querySelector('meta[name="theme-color"]')?.setAttribute('content', t === 'dark' ? '#071218' : '#f6f3ed');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
